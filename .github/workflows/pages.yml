name: Deploy website to GitHub Pages

on:
  push:
    branches: [main]
    paths: ["website/**", "docs/legal/*.pdf", ".github/workflows/pages.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Assemble site (landing page + legal PDFs)
        run: |
          mkdir -p _site/legal
          cp -r website/* _site/
          cp docs/legal/*.pdf _site/legal/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
