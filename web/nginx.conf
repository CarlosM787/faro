server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Same-origin API: proxy to the FastAPI service (docker-compose network)
    location /api/ {
        proxy_pass http://api:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        # SSE support for the chat stream
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }
}
