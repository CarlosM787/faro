<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="beam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FFB020" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#FFB020" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="120" height="120" rx="26" fill="#0B1220"/>
  <!-- lighthouse beam sweeping over a candlestick chart -->
  <path d="M38 34 L112 16 L112 52 Z" fill="url(#beam)"/>
  <!-- lighthouse tower -->
  <path d="M32 96 L36 40 L44 40 L48 96 Z" fill="#E6EDF7"/>
  <rect x="34" y="30" width="12" height="10" rx="2" fill="#FFB020"/>
  <!-- candlestick bars rising toward the light -->
  <g stroke="#2DD4BF" stroke-width="3" stroke-linecap="round">
    <line x1="64" y1="70" x2="64" y2="96"/>
    <line x1="80" y1="58" x2="80" y2="96"/>
    <line x1="96" y1="46" x2="96" y2="96"/>
  </g>
  <g fill="#2DD4BF">
    <rect x="59" y="74" width="10" height="14" rx="2"/>
    <rect x="75" y="63" width="10" height="16" rx="2"/>
    <rect x="91" y="52" width="10" height="18" rx="2"/>
  </g>
</svg>
